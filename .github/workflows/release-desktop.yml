name: Release Desktop (egui)

on:
  push:
    tags: ["desktop-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: monstock-desktop-linux
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: monstock-desktop-windows.exe
            ext: .exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: monstock-desktop-macos
            ext: ""

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y
          libxcb1-dev
          libgtk-3-dev
          libxkbcommon-dev
          libwayland-dev
          libudev-dev

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "monstock-desktop -> target"

      - name: Build release binary
        run: cargo build --release -p monstock-desktop

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/release/monstock-desktop${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: monstock-desktop-*
          merge-multiple: true

      - name: Prepare release files
        run: |
          chmod +x monstock-desktop-linux monstock-desktop-macos 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            monstock-desktop-linux
            monstock-desktop-windows.exe
            monstock-desktop-macos
          draft: false
          prerelease: false
          generate_release_notes: true
