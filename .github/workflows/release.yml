name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxcb1-dev libgtk-3-dev

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - run: cargo build --workspace --release

      - name: Rename binary
        run: cp target/release/monstock-desktop${{ matrix.ext }} monstock-${{ matrix.target }}${{ matrix.ext }}

      - uses: actions/upload-artifact@v6
        with:
          name: monstock-${{ matrix.target }}
          path: monstock-${{ matrix.target }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: monstock-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: monstock-*
          generate_release_notes: true
