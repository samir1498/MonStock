name: Release Tauri

on:
  push:
    tags: ["tauri-v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y
          libwebkit2gtk-4.1-dev
          libsoup-3.0-dev
          libjavascriptcoregtk-4.1-dev
          libgtk-3-dev
          libxcb1-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          libssl-dev
          patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11"
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('monstock-tauri/pnpm-lock.yaml') }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "monstock-tauri/src-tauri -> target"

      - name: Build frontend
        run: pnpm install && pnpm run build
        working-directory: monstock-tauri

      - name: Build Tauri bundle
        run: cargo tauri build
        working-directory: monstock-tauri
        env:
          TAURI_PRIVATE_KEY: ""
          TAURI_KEY_PASSWORD: ""

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ runner.os }}
          path: monstock-tauri/src-tauri/target/release/bundle/
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          pattern: bundles-*
          merge-multiple: true

      - name: Generate updater JSON
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#tauri-v}
          # Find the AppImage for the updater endpoint URL
          APPIMAGE=$(find . -name "*.AppImage" -type f | head -1)
          APPIMAGE_NAME=$(basename "$APPIMAGE" 2>/dev/null || echo "MonStock-${VERSION}.AppImage")
          cat > tauri-update.json << EOF
          {
            "version": "$VERSION",
            "notes": "See https://github.com/samir1498/MonStock/releases/tag/$TAG",
            "pub_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "platforms": {
              "linux-x86_64": {
                "signature": "",
                "url": "https://github.com/samir1498/MonStock/releases/download/$TAG/${APPIMAGE_NAME}"
              },
              "windows-x86_64": {
                "signature": "",
                "url": "https://github.com/samir1498/MonStock/releases/download/$TAG/MonStock_${VERSION}_x64-setup.exe"
              },
              "darwin-aarch64": {
                "signature": "",
                "url": "https://github.com/samir1498/MonStock/releases/download/$TAG/MonStock_${VERSION}_aarch64.dmg"
              },
              "darwin-x86_64": {
                "signature": "",
                "url": "https://github.com/samir1498/MonStock/releases/download/$TAG/MonStock_${VERSION}_x64.dmg"
              }
            }
          }
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.deb
            **/*.AppImage
            **/*.rpm
            **/*.msi
            **/*.exe
            **/*.dmg
            **/*.app
            tauri-update.json
          draft: false
          prerelease: false
          generate_release_notes: true
